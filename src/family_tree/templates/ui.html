<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Tree UI Validator</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --panel-soft: #eef4f1;
      --text: #17201c;
      --muted: #65736d;
      --line: #d8dfdb;
      --accent: #136f63;
      --accent-strong: #0b4f47;
      --shadow: 0 10px 25px rgba(28, 38, 34, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 26px clamp(18px, 4vw, 56px) 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    nav {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      background: var(--panel-soft);
      font-weight: 700;
      font-size: 0.92rem;
    }

    nav a.active {
      color: white;
      background: var(--accent);
      border-color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.5rem);
      font-weight: 760;
      letter-spacing: 0;
    }

    header p {
      max-width: 760px;
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 24px auto 40px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }

    .workspace {
      display: grid;
      gap: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.02rem;
      letter-spacing: 0;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 650;
    }

    input,
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      color: var(--text);
      background: #fff;
      font: inherit;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 9px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button.secondary {
      color: var(--text);
      background: var(--panel-soft);
      border-color: var(--line);
    }

    button.secondary:hover {
      background: #dfeae5;
    }

    aside {
      position: sticky;
      top: 18px;
    }

    .output {
      min-height: 220px;
      margin: 0;
      white-space: pre-wrap;
      overflow: auto;
      color: #10201b;
      background: #f2f6f4;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      line-height: 1.5;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    @media (max-width: 880px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav aria-label="Validation modes">
      <a class="active" href="/ui">UI Validator</a>
      <a href="/terminal">Terminal Validator</a>
    </nav>
    <h1>Family Tree UI Validator</h1>
    <p>Run one command at a time with structured controls for child addition and relationship lookup.</p>
  </header>

  <main>
    <section class="workspace">
      <section class="panel">
        <h2>Add Child</h2>
        <form id="add-child-form">
          <div class="grid">
            <label>Mother name
              <input name="mother_name" value="Flora" autocomplete="off">
            </label>
            <label>Child name
              <input name="child_name" value="Minerva" autocomplete="off">
            </label>
            <label>Gender
              <select name="gender">
                <option>Female</option>
                <option>Male</option>
              </select>
            </label>
          </div>
          <div class="actions">
            <button type="submit">Add child</button>
            <button class="secondary" type="button" id="reset-tree">Reset tree</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Get Relationship</h2>
        <form id="relationship-form">
          <div class="grid">
            <label>Name
              <input name="name" value="Lily" autocomplete="off">
            </label>
            <label>Relationship
              <select name="relationship">
                {% for relationship in relationships %}
                <option>{{ relationship }}</option>
                {% endfor %}
              </select>
            </label>
            <label>&nbsp;
              <button type="submit">Resolve</button>
            </label>
          </div>
        </form>
      </section>
    </section>

    <aside class="panel">
      <h2>Output</h2>
      <pre class="output" id="output">Ready</pre>
      <div class="status" id="status">Arthur tree initialized.</div>
    </aside>
  </main>

  <script>
    const output = document.querySelector("#output");
    const status = document.querySelector("#status");

    async function postJson(url, body = {}) {
      const response = await fetch(url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body),
      });
      if (!response.ok) {
        throw new Error(`Request failed with ${response.status}`);
      }
      return response.json();
    }

    function formPayload(form) {
      return Object.fromEntries(new FormData(form).entries());
    }

    function showResult(value, message) {
      output.textContent = value;
      status.textContent = message;
    }

    document.querySelector("#add-child-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = await postJson("/api/add-child", formPayload(event.currentTarget));
      showResult(data.output, "ADD_CHILD completed.");
    });

    document.querySelector("#relationship-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = await postJson("/api/relationship", formPayload(event.currentTarget));
      showResult(data.output, "GET_RELATIONSHIP completed.");
    });

    document.querySelector("#reset-tree").addEventListener("click", async () => {
      const data = await postJson("/api/reset");
      showResult(data.output, "Arthur tree restored to initial state.");
    });
  </script>
</body>
</html>
