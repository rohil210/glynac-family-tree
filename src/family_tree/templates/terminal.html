<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Tree Terminal Validator</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --panel-soft: #eef4f1;
      --text: #17201c;
      --muted: #65736d;
      --line: #d8dfdb;
      --accent: #136f63;
      --accent-strong: #0b4f47;
      --shadow: 0 10px 25px rgba(28, 38, 34, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 26px clamp(18px, 4vw, 56px) 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    nav {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      background: var(--panel-soft);
      font-weight: 700;
      font-size: 0.92rem;
    }

    nav a.active {
      color: white;
      background: var(--accent);
      border-color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.5rem);
      font-weight: 760;
      letter-spacing: 0;
    }

    header p {
      max-width: 760px;
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 24px auto 40px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.02rem;
      letter-spacing: 0;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 650;
    }

    textarea,
    .output {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      color: var(--text);
      background: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    textarea {
      min-height: 330px;
      resize: vertical;
    }

    .output {
      min-height: 330px;
      margin: 0;
      white-space: pre-wrap;
      overflow: auto;
      color: #10201b;
      background: #f2f6f4;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 9px 14px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button.secondary {
      color: var(--text);
      background: var(--panel-soft);
      border-color: var(--line);
    }

    button.secondary:hover {
      background: #dfeae5;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    aside {
      position: sticky;
      top: 18px;
    }

    @media (max-width: 880px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav aria-label="Validation modes">
      <a href="/ui">UI Validator</a>
      <a class="active" href="/terminal">Terminal Validator</a>
    </nav>
    <h1>Family Tree Terminal Validator</h1>
    <p>Paste challenge commands and compare the output against the command-line program.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Input Commands</h2>
      <form id="commands-form">
        <label>Command file content
          <textarea name="commands">ADD_CHILD Flora Minerva Female
GET_RELATIONSHIP Remus Maternal-Aunt
GET_RELATIONSHIP Minerva Siblings
ADD_CHILD Luna Lola Female
GET_RELATIONSHIP Luna Maternal-Aunt
ADD_CHILD Ted Bella Female
GET_RELATIONSHIP Remus Siblings
GET_RELATIONSHIP Lily Sister-In-Law</textarea>
        </label>
        <div class="actions">
          <button type="submit">Run commands</button>
          <button class="secondary" type="button" id="reset-tree">Reset tree</button>
        </div>
      </form>
    </section>

    <aside class="panel">
      <h2>Console Output</h2>
      <pre class="output" id="output">Ready</pre>
      <div class="status" id="status">Arthur tree initialized.</div>
    </aside>
  </main>

  <script>
    const output = document.querySelector("#output");
    const status = document.querySelector("#status");

    async function postJson(url, body = {}) {
      const response = await fetch(url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body),
      });
      if (!response.ok) {
        throw new Error(`Request failed with ${response.status}`);
      }
      return response.json();
    }

    document.querySelector("#commands-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const commands = new FormData(event.currentTarget).get("commands");
      const data = await postJson("/api/commands", {commands, reset_before: true});
      output.textContent = data.outputs.join("\n");
      status.textContent = "Batch commands completed.";
    });

    document.querySelector("#reset-tree").addEventListener("click", async () => {
      const data = await postJson("/api/reset");
      output.textContent = data.output;
      status.textContent = "Arthur tree restored to initial state.";
    });
  </script>
</body>
</html>
